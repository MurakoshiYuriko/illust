<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono Timeline</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  border-left: 1px solid #eee;
  border-right: 1px solid #eee;
  min-height: 100vh;
}

.header {
  padding: 15px;
  font-weight: bold;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  background: white;
}

.post-form {
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.post {
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.row {
  display: flex;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  background: #ddd;
  border-radius: 50%;
  text-align: center;
  line-height: 40px;
}

.content {
  flex: 1;
}

.name {
  font-weight: bold;
}

.time {
  color: gray;
  font-size: 12px;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.actions {
  display: flex;
  gap: 15px;
  margin-top: 10px;
  color: gray;
}

button {
  border: none;
  background: none;
  cursor: pointer;
}

.comment-box { display:none; }
.comment-box.open { display:block; }

.comment {
  background: #f3f3f3;
  padding: 6px;
  margin-top: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Mono Timeline</div>

<div class="post-form">
  <input id="user" placeholder="名前"><br><br>
  <input id="title" placeholder="タイトル"><br><br>
  <input id="file" type="file"><br><br>
  <textarea id="text" placeholder="ひとこと"></textarea><br><br>
  <button onclick="addPost()">投稿</button>
</div>

<div id="timeline"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("data")) || [];

function save(){
  localStorage.setItem("data", JSON.stringify(posts));
}

function addPost(){
  const user = document.getElementById("user").value;
  const title = document.getElementById("title").value;
  const file = document.getElementById("file").files[0];
  const text = document.getElementById("text").value;

  if(!user || !title || !file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    posts.unshift({
      id: Date.now(),
      user,
      title,
      img: e.target.result,
      text,
      likes: 0,
      comments: [],
      open:false,
      time: new Date().toLocaleString()
    });
    save();
    render();
  };
  reader.readAsDataURL(file);
}

function like(id){
  let p = posts.find(p=>p.id==id);
  p.likes++;
  save();
  render();
}

function toggle(id){
  let p = posts.find(p=>p.id==id);
  p.open = !p.open;
  render();
}

function comment(id){
  let input = document.getElementById("c"+id);
  if(!input.value) return;

  let p = posts.find(p=>p.id==id);
  p.comments.push(input.value);
  p.open=false;

  save();
  render();
}

function render(){
  const tl = document.getElementById("timeline");

  tl.innerHTML = posts.map(p=>`
    <div class="post">
      <div class="row">
        <div class="avatar">${p.user[0]}</div>

        <div class="content">
          <div class="name">${p.user}</div>
          <div class="time">${p.time}</div>

          <div>${p.title}</div>
          <div>${p.text}</div>

          <img src="${p.img}">

          <div class="actions">
            <button onclick="like(${p.id})">♡ ${p.likes}</button>
            <button onclick="toggle(${p.id})">💬</button>
          </div>

          <div class="comment-box ${p.open?'open':''}">
            <input id="c${p.id}">
            <button onclick="comment(${p.id})">送信</button>
          </div>

          ${p.comments.map(c=>`<div class="comment">${c}</div>`).join("")}
        </div>
      </div>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
