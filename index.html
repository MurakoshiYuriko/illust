<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonoArt Feed</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #ffffff;
  color: #111;
  font-family: sans-serif;
}

.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1000px;
  margin: 0 auto;
}

.sidebar {
  border-right: 1px solid #eee;
  padding: 20px;
}

.main {
  border-right: 1px solid #eee;
}

.topbar {
  padding: 16px;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}

.post-form, .post {
  padding: 16px;
  border-bottom: 1px solid #eee;
}

.row {
  display: flex;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  background: #ddd;
  border-radius: 50%;
  text-align: center;
  line-height: 40px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
}

.submit-btn {
  background: black;
  color: white;
}

.post img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.comment-box { display:none; }
.comment-box.open { display:block; }

.comment {
  background: #f3f3f3;
  padding: 6px;
  margin-top: 6px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>MonoArt</h2>
</div>

<div class="main">

<div class="topbar">ホーム</div>

<div class="post-form">
  <input id="userName" placeholder="ユーザー名">
  <input id="title" placeholder="タイトル">
  <input id="image" type="file">
  <textarea id="desc" placeholder="説明"></textarea>
  <button class="submit-btn" onclick="addPost()">投稿</button>
</div>

<div id="timeline"></div>

</div>

</div>

<script>
const STORAGE = "posts_v3";

let posts = JSON.parse(localStorage.getItem(STORAGE)) || [];

function save(){
  localStorage.setItem(STORAGE, JSON.stringify(posts));
}

function addPost(){
  const user = userName.value;
  const titleText = title.value;
  const file = image.files[0];
  const descText = desc.value;

  if(!user || !titleText || !file){
    alert("全部入力して！");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    posts.unshift({
      id: Date.now(),
      user,
      title: titleText,
      image: e.target.result,
      desc: descText,
      likes: 0,
      comments: [],
      open:false
    });

    save();
    render();
  };

  reader.readAsDataURL(file);
}

function like(id){
  const p = posts.find(p=>p.id===id);
  p.likes++;
  save();
  render();
}

function toggle(id){
  const p = posts.find(p=>p.id===id);
  p.open = !p.open;
  render();
}

function addComment(id){
  const input = document.getElementById("c"+id);
  if(!input.value) return;

  const p = posts.find(p=>p.id===id);
  p.comments.push(input.value);
  p.open=false;

  save();
  render();
}

function render(){
  timeline.innerHTML = posts.map(p=>`
    <div class="post">
      <div class="row">
        <div class="avatar">${p.user[0]}</div>
        <div>
          <b>${p.user}</b>
          <div>${p.title}</div>
          <div>${p.desc}</div>
          <img src="${p.image}">
          
          <div class="actions">
            <button onclick="like(${p.id})">♡ ${p.likes}</button>
            <button onclick="toggle(${p.id})">💬</button>
          </div>

          <div class="comment-box ${p.open?'open':''}">
            <input id="c${p.id}">
            <button onclick="addComment(${p.id})">送信</button>
          </div>

          ${p.comments.map(c=>`<div class="comment">${c}</div>`).join("")}
        </div>
      </div>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
