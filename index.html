<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お絵かき掲示板</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: 0 auto 20px;
      background: white;
      padding: 16px;
      border-radius: 12px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .post {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 12px;
    }

    .post img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }

    .comment {
      background: #f0f0f0;
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .like-btn {
      margin-top: 10px;
      background: pink;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>お絵かき掲示板</h1>

  <div class="box">
    <input type="text" id="name" placeholder="名前">
    <input type="text" id="title" placeholder="タイトル">
    <input type="text" id="imageUrl" placeholder="画像URL">
    <textarea id="text" placeholder="ひとこと"></textarea>
    <button onclick="addPost()">投稿する</button>
  </div>

  <div id="posts"></div>

  <script>
    let posts = [];

    function addPost() {
      const name = document.getElementById("name").value;
      const title = document.getElementById("title").value;
      const imageUrl = document.getElementById("imageUrl").value;
      const text = document.getElementById("text").value;

      if (!name || !title) {
        alert("名前とタイトルは必須です");
        return;
      }

      const post = {
        id: Date.now(),
        name,
        title,
        imageUrl,
        text,
        likes: 0,
        comments: []
      };

      posts.unshift(post);
      renderPosts();

      document.getElementById("name").value = "";
      document.getElementById("title").value = "";
      document.getElementById("imageUrl").value = "";
      document.getElementById("text").value = "";
    }

    function likePost(id) {
      const post = posts.find(p => p.id === id);
      post.likes++;
      renderPosts();
    }

    function addComment(id) {
      const input = document.getElementById("comment-" + id);
      const text = input.value;

      if (!text) return;

      const post = posts.find(p => p.id === id);
      post.comments.push(text);
      renderPosts();
    }

    function renderPosts() {
      const postsDiv = document.getElementById("posts");
      postsDiv.innerHTML = "";

      posts.forEach(post => {
        const postEl = document.createElement("div");
        postEl.className = "box post";

        postEl.innerHTML = `
          <h2>${post.title}</h2>
          <p><strong>${post.name}</strong></p>
          <p>${post.text}</p>
          ${post.imageUrl ? `<img src="${post.imageUrl}" alt="">` : ""}
          <button class="like-btn" onclick="likePost(${post.id})">いいね (${post.likes})</button>
          <div style="margin-top:10px;">
            <input type="text" id="comment-${post.id}" placeholder="コメントを書く">
            <button onclick="addComment(${post.id})">コメント送信</button>
          </div>
          <div>
            ${post.comments.map(c => `<div class="comment">${c}</div>`).join("")}
          </div>
        `;

        postsDiv.appendChild(postEl);
      });
    }
  </script>
</body>
</html>
