<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonoArt Feed</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000;
      --text: #e7e9ea;
      --muted: #71767b;
      --border: #2f3336;
      --panel: #16181c;
      --panel-soft: #111214;
      --hover: #16181c;
      --avatar-a: #3a3a3a;
      --avatar-b: #1e1e1e;
      --submit-bg: #eff3f4;
      --submit-text: #0f1419;
      --field-bg: transparent;
      --banner-a: #1b1b1b;
      --banner-b: #3a3a3a;
      --profile-ring: #000;
    }

    body.light {
      --bg: #ffffff;
      --text: #111111;
      --muted: #536471;
      --border: #eff3f4;
      --panel: #f7f9f9;
      --panel-soft: #f7f9f9;
      --hover: #f2f4f5;
      --avatar-a: #d7dbdc;
      --avatar-b: #b8c0c2;
      --submit-bg: #0f1419;
      --submit-text: #ffffff;
      --field-bg: #ffffff;
      --banner-a: #eceff1;
      --banner-b: #cfd8dc;
      --profile-ring: #ffffff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px 1fr 300px;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 12px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 26px;
      margin-bottom: 12px;
    }

    .logo:hover,
    .nav-item:hover,
    .profile-link:hover,
    .back-btn:hover,
    .icon-btn:hover,
    .submit-btn:hover,
    .small-btn:hover,
    .danger-btn:hover,
    .theme-btn:hover {
      background: var(--hover);
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav-item,
    .theme-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      width: fit-content;
      padding: 14px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
      border: none;
      background: transparent;
      color: var(--text);
    }

    .nav-item.active {
      font-weight: 700;
    }

    .sidebar-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 6px;
    }

    .main {
      border-right: 1px solid var(--border);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 700;
    }

    .composer,
    .post {
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--avatar-a), var(--avatar-b));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      border: 1px solid var(--border);
    }

    body.light .avatar {
      color: #111;
    }

    .composer-main,
    .post-main {
      flex: 1;
      min-width: 0;
    }

    .composer-title {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--muted);
    }

    .field,
    .textarea,
    .comment-input,
    .file-input {
      width: 100%;
      background: var(--field-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .field:focus,
    .textarea:focus,
    .comment-input:focus,
    .file-input:focus {
      border-color: var(--muted);
    }

    .textarea {
      resize: vertical;
      min-height: 110px;
    }

    .field::placeholder,
    .textarea::placeholder,
    .comment-input::placeholder {
      color: var(--muted);
    }

    .composer-fields {
      display: grid;
      gap: 10px;
    }

    .composer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .submit-btn,
    .small-btn,
    .danger-btn {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 700;
    }

    .submit-btn {
      background: var(--submit-bg);
      color: var(--submit-text);
      padding: 10px 18px;
      font-size: 15px;
    }

    .small-btn,
    .danger-btn {
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 14px;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .name {
      font-weight: 700;
      color: var(--text);
    }

    .profile-link {
      border-radius: 999px;
      padding: 2px 6px;
      margin-left: -6px;
      cursor: pointer;
    }

    .user-id,
    .time-dot,
    .time-text,
    .muted {
      color: var(--muted);
    }

    .post-title {
      margin: 8px 0 8px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .post-text {
      white-space: pre-wrap;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 12px;
    }

    .post-image {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--border);
      display: block;
      margin-top: 10px;
      max-height: 520px;
      object-fit: cover;
      background: var(--panel-soft);
    }

    .post-actions {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .post-actions-left {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .comment-box {
      margin-top: 12px;
      display: none;
    }

    .comment-box.open {
      display: block;
    }

    .comment-controls {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .comments {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .comment-item {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .empty {
      padding: 40px 20px;
      color: var(--muted);
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .rightbar {
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .panel p,
    .panel li {
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }

    .panel ul {
      margin: 0;
      padding-left: 18px;
    }

    .profile-page {
      display: none;
      border-bottom: 1px solid var(--border);
    }

    .profile-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .profile-banner {
      height: 140px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--banner-a), var(--banner-b));
      border: 1px solid var(--border);
    }

    .profile-meta {
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      min-width: 72px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--avatar-a), var(--avatar-b));
      border: 4px solid var(--profile-ring);
      margin-top: -28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
    }

    body.light .profile-avatar {
      color: #111;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 18px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
    }

    .stats strong {
      color: var(--text);
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 88px 1fr;
      }

      .rightbar {
        display: none;
      }

      .nav-text,
      .sidebar-note {
        display: none;
      }

      .nav-item,
      .theme-btn {
        justify-content: center;
        width: 56px;
        padding: 14px 0;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }

    @media (max-width: 700px) {
      .layout {
        display: block;
      }

      .sidebar,
      .rightbar {
        display: none;
      }

      .main {
        border-right: none;
      }

      .composer,
      .post,
      .topbar,
      .profile-head {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">●</div>

      <nav class="nav">
        <div class="nav-item active">
          <span>⌂</span>
          <span class="nav-text">ホーム</span>
        </div>
        <div class="nav-item" onclick="goHome()">
          <span>✎</span>
          <span class="nav-text">投稿</span>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">
          <span id="themeIcon">☀</span>
          <span class="nav-text" id="themeLabel">ライト</span>
        </button>
      </nav>

      <div class="sidebar-note">
        X風のイラスト投稿サイト。<br>
        コメントといいねだけのシンプルな交流用です。
      </div>
    </aside>

    <main class="main">
      <div class="topbar" id="topbarTitle">ホーム</div>

      <section id="homePage">
        <div class="composer">
          <div class="row">
            <div class="avatar" id="composerAvatar">U</div>

            <div class="composer-main">
              <div class="composer-title">作品を投稿する</div>

              <div class="composer-fields">
                <input id="userName" class="field" type="text" placeholder="ユーザー名">
                <input id="artTitle" class="field" type="text" placeholder="作品タイトル">
                <input id="artImage" class="file-input" type="file" accept="image/*">
                <textarea id="artDesc" class="textarea" placeholder="作品の説明やこだわりを書く"></textarea>
              </div>

              <div class="composer-actions">
                <button class="submit-btn" onclick="addPost()">投稿する</button>
              </div>
            </div>
          </div>
        </div>

        <section id="timeline"></section>
      </section>

      <section id="profilePage" class="profile-page"></section>
    </main>

    <aside class="rightbar">
      <div class="panel">
        <h2 class="panel-title">このサイトについて</h2>
        <p>
          X風の見た目で作った、イラスト投稿用の小さなWeb作品です。
          投稿、コメント、いいね、プロフィール表示ができます。
        </p>
      </div>

      <div class="panel">
        <h2 class="panel-title">ポイント</h2>
        <ul>
          <li>ライト / ダークモード切替</li>
          <li>画像ファイルを直接アップロード</li>
          <li>コメント送信後に入力欄が閉じる</li>
        </ul>
      </div>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = "monoart_feed_posts_v2";
    const THEME_KEY = "monoart_feed_theme_v1";

    const defaultPosts = [
      {
        id: crypto.randomUUID(),
        userName: "yuri",
        title: "夜のスケッチ",
        image: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1200&q=80",
        description: "モノクロの雰囲気を意識してまとめた作品です。",
        likes: 4,
        comments: ["雰囲気がすごく好き", "世界観がきれい"],
        commentOpen: false,
        createdAt: new Date().toISOString()
      },
      {
        id: crypto.randomUUID(),
        userName: "mika",
        title: "静かな部屋",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80",
        description: "落ち着いた空気感をテーマにしたイラスト投稿です。",
        likes: 2,
        comments: [],
        commentOpen: false,
        createdAt: new Date(Date.now() - 3600 * 1000 * 5).toISOString()
      }
    ];

    function loadPosts() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          console.error("読み込みエラー", e);
        }
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultPosts));
      return defaultPosts;
    }

    let posts = loadPosts();

    function savePosts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function getInitial(name) {
      if (!name) return "U";
      return name.trim().charAt(0).toUpperCase();
    }

    function formatTime(iso) {
      const date = new Date(iso);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${y}/${m}/${d} ${h}:${min}`;
    }

    function updateComposerAvatar() {
      const userName = document.getElementById("userName").value.trim();
      document.getElementById("composerAvatar").textContent = getInitial(userName);
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY) || "dark";
      applyTheme(savedTheme);
    }

    function applyTheme(theme) {
      document.body.classList.toggle("light", theme === "light");
      localStorage.setItem(THEME_KEY, theme);

      const icon = document.getElementById("themeIcon");
      const label = document.getElementById("themeLabel");

      if (theme === "light") {
        icon.textContent = "☾";
        label.textContent = "ダーク";
      } else {
        icon.textContent = "☀";
        label.textContent = "ライト";
      }
    }

    function toggleTheme() {
      const current = document.body.classList.contains("light") ? "light" : "dark";
      applyTheme(current === "light" ? "dark" : "light");
    }

    document.getElementById("userName").addEventListener("input", updateComposerAvatar);

    function addPost() {
      const userName = document.getElementById("userName").value.trim();
      const title = document.getElementById("artTitle").value.trim();
      const file = document.getElementById("artImage").files[0];
      const description = document.getElementById("artDesc").value.trim();

      if (!userName || !title || !file) {
        alert("ユーザー名・作品タイトル・画像ファイルは必須です。");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        const newPost = {
          id: crypto.randomUUID(),
          userName,
          title,
          image: e.target.result,
          description,
          likes: 0,
          comments: [],
          commentOpen: false,
          createdAt: new Date().toISOString()
        };

        posts.unshift(newPost);
        savePosts();
        renderTimeline();
        clearForm();
        goHome();
      };

      reader.readAsDataURL(file);
    }

    function clearForm() {
      document.getElementById("userName").value = "";
      document.getElementById("artTitle").value = "";
      document.getElementById("artImage").value = "";
      document.getElementById("artDesc").value = "";
      updateComposerAvatar();
    }

    function likePost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;
      post.likes += 1;
      savePosts();
      renderTimeline();
      refreshProfileIfOpen(post.userName);
    }

    function toggleComment(id) {
      posts = posts.map(post => {
        if (post.id === id) {
          return { ...post, commentOpen: !post.commentOpen };
        }
        return post;
      });
      savePosts();
      renderTimeline();
      refreshProfileIfOpen(window.currentProfileUser);
    }

    function addComment(id) {
      const input = document.getElementById(`comment-${id}`);
      if (!input) return;

      const text = input.value.trim();
      if (!text) return;

      const post = posts.find(p => p.id === id);
      if (!post) return;

      post.comments.push(text);
      post.commentOpen = false;
      savePosts();
      renderTimeline();
      refreshProfileIfOpen(post.userName);
    }

    function deletePost(id) {
      const target = posts.find(p => p.id === id);
      if (!target) return;

      const ok = confirm("この投稿を削除しますか？");
      if (!ok) return;

      posts = posts.filter(p => p.id !== id);
      savePosts();
      renderTimeline();
      refreshProfileIfOpen(target.userName);
      if (posts.length === 0) {
        goHome();
      }
    }

    function renderPost(post) {
      return `
        <article class="post">
          <div class="row">
            <div class="avatar">${escapeHtml(getInitial(post.userName))}</div>

            <div class="post-main">
              <div class="post-header">
                <button class="profile-link" onclick="showProfile('${encodeURIComponent(post.userName)}')">
                  <span class="name">${escapeHtml(post.userName)}</span>
                </button>
                <span class="user-id">@${escapeHtml(post.userName)}</span>
                <span class="time-dot">·</span>
                <span class="time-text">${formatTime(post.createdAt)}</span>
              </div>

              <div class="post-title">${escapeHtml(post.title)}</div>
              <div class="post-text">${escapeHtml(post.description)}</div>

              <img class="post-image" src="${post.image}" alt="${escapeHtml(post.title)}">

              <div class="post-actions">
                <div class="post-actions-left">
                  <button class="icon-btn" onclick="toggleComment('${post.id}')">💬 ${post.comments.length}</button>
                  <button class="icon-btn" onclick="likePost('${post.id}')">♡ ${post.likes}</button>
                </div>

                <button class="danger-btn" onclick="deletePost('${post.id}')">削除</button>
              </div>

              <div class="comment-box ${post.commentOpen ? "open" : ""}">
                <input id="comment-${post.id}" class="comment-input" type="text" placeholder="コメントを書く">
                <div class="comment-controls">
                  <button class="submit-btn" onclick="addComment('${post.id}')">送信</button>
                </div>
              </div>

              <div class="comments">
                ${post.comments.map(comment => `
                  <div class="comment-item">${escapeHtml(comment)}</div>
                `).join("")}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderTimeline() {
      const timeline = document.getElementById("timeline");
      const sortedPosts = [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (sortedPosts.length === 0) {
        timeline.innerHTML = `<div class="empty">まだ投稿がありません。</div>`;
        return;
      }

      timeline.innerHTML = sortedPosts.map(renderPost).join("");
    }

    function showProfile(encodedUserName) {
      const userName = decodeURIComponent(encodedUserName);
      const profilePage = document.getElementById("profilePage");
      const homePage = document.getElementById("homePage");
      const topbarTitle = document.getElementById("topbarTitle");

      const userPosts = [...posts]
        .filter(post => post.userName === userName)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      const totalLikes = userPosts.reduce((sum, post) => sum + post.likes, 0);
      const totalComments = userPosts.reduce((sum, post) => sum + post.comments.length, 0);

      profilePage.innerHTML = `
        <div class="profile-head">
          <button class="back-btn" onclick="goHome()">← 戻る</button>

          <div class="profile-banner"></div>

          <div class="profile-meta">
            <div class="profile-avatar">${escapeHtml(getInitial(userName))}</div>

            <div>
              <div class="profile-name">${escapeHtml(userName)}</div>
              <div class="muted">@${escapeHtml(userName)}</div>

              <div class="stats">
                <div><strong>${userPosts.length}</strong> 投稿</div>
                <div><strong>${totalLikes}</strong> いいね</div>
                <div><strong>${totalComments}</strong> コメント</div>
              </div>
            </div>
          </div>
        </div>

        <div>
          ${userPosts.length === 0
            ? `<div class="empty">このユーザーの投稿はまだありません。</div>`
            : userPosts.map(renderPost).join("")}
        </div>
      `;

      homePage.style.display = "none";
      profilePage.style.display = "block";
      topbarTitle.textContent = `${userName} のプロフィール`;
      window.currentProfileUser = userName;
    }

    function goHome() {
      document.getElementById("homePage").style.display = "block";
      document.getElementById("profilePage").style.display = "none";
      document.getElementById("topbarTitle").textContent = "ホーム";
      window.currentProfileUser = null;
    }

    function refreshProfileIfOpen(userName) {
      if (window.currentProfileUser && window.currentProfileUser === userName) {
        showProfile(encodeURIComponent(userName));
      }
    }

    loadTheme();
    updateComposerAvatar();
    renderTimeline();
  </script>
</body>
</html>
