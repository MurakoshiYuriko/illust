<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pastel Art Room</title>
<style>
body {
  background: #fff5f7;
  font-family: "Arial", sans-serif;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff6b81;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  border-radius: 15px;
}

button {
  background: #ffb6c1;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

input {
  padding: 8px;
  width: 70%;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.comment {
  background: #ffeef2;
  padding: 5px;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h1>🎀 Pastel Art Room 🎀</h1>

<div class="container">

<div class="card">
  <h3>うさぎちゃん</h3>
  <img src="https://picsum.photos/400/300">

  <button onclick="like(0)">❤️ いいね <span id="like0">0</span></button>

  <div>
    <input id="comment0">
    <button onclick="addComment(0)">送信</button>
  </div>

  <div id="comments0"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [
  {likes:0, comments:[]}
];

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function like(i){
  data[i].likes++;
  save();
  document.getElementById("like"+i).innerText = data[i].likes;
}

function addComment(i){
  let input = document.getElementById("comment"+i);
  if(!input.value) return;

  data[i].comments.push(input.value);
  input.value="";
  save();
  render();
}

function render(){
  data.forEach((post,i)=>{
    document.getElementById("like"+i).innerText = post.likes;

    let html="";
    post.comments.forEach(c=>{
      html += `<div class="comment">${c}</div>`;
    });

    document.getElementById("comments"+i).innerHTML = html;
  });
}

render();
</script>

</body>
</html>
