<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Art Room</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    font-family: sans-serif;
    background: #fff7fb;
    color: #444;
  }

  h1 {
    text-align: center;
    color: #ff7aa2;
    margin-bottom: 30px;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  .card {
    background: #ffffff;
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 24px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  .card img {
    width: 100%;
    border-radius: 16px;
    display: block;
    margin-bottom: 12px;
  }

  .title {
    font-size: 22px;
    margin: 0 0 8px;
    color: #ff6f91;
  }

  .desc {
    margin: 0 0 14px;
    line-height: 1.6;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  button {
    border: none;
    border-radius: 12px;
    padding: 9px 14px;
    cursor: pointer;
    font-size: 14px;
  }

  .like-btn {
    background: #ffd6e2;
  }

  .comment-toggle-btn {
    background: #e8d9ff;
  }

  .comment-area {
    margin-top: 10px;
    padding: 12px;
    background: #fff1f6;
    border-radius: 14px;
  }

  .comment-area.hidden {
    display: none;
  }

  .comment-input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    border: 1px solid #f1bfd0;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .send-btn {
    background: #ffb7cc;
  }

  .comments {
    margin-top: 14px;
  }

  .comment {
    background: #fff0f5;
    border-radius: 10px;
    padding: 8px 10px;
    margin-top: 8px;
  }

  .small {
    color: #888;
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>🎀 Pastel Art Room 🎀</h1>

<div class="container" id="gallery"></div>

<script>
const STORAGE_KEY = "pastel_art_room_data";

const defaultData = [
  {
    title: "うさぎちゃん",
    image: "https://picsum.photos/id/237/700/420",
    description: "ふんわりした雰囲気のイラストです。",
    likes: 0,
    comments: [],
    commentOpen: false
  },
  {
    title: "いちごケーキ",
    image: "https://picsum.photos/id/1080/700/420",
    description: "かわいい色合いを意識した作品です。",
    likes: 0,
    comments: [],
    commentOpen: false
  }
];

let artworks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(artworks));
}

function toggleComment(index) {
  artworks[index].commentOpen = !artworks[index].commentOpen;
  saveData();
  render();
}

function likeArtwork(index) {
  artworks[index].likes++;
  saveData();
  render();
}

function addComment(index) {
  const input = document.getElementById(`comment-input-${index}`);
  const text = input.value.trim();

  if (!text) return;

  artworks[index].comments.push(text);

  // 送信後にコメント欄を閉じる
  artworks[index].commentOpen = false;

  saveData();
  render();
}

function render() {
  const gallery = document.getElementById("gallery");

  gallery.innerHTML = artworks.map((art, index) => `
    <div class="card">
      <img src="${art.image}" alt="${art.title}">
      <h2 class="title">${art.title}</h2>
      <p class="desc">${art.description}</p>

      <div class="buttons">
        <button class="like-btn" onclick="likeArtwork(${index})">❤️ いいね ${art.likes}</button>
        <button class="comment-toggle-btn" onclick="toggleComment(${index})">
          💬 コメントする
        </button>
      </div>

      <div class="comment-area ${art.commentOpen ? "" : "hidden"}">
        <input
          id="comment-input-${index}"
          class="comment-input"
          type="text"
          placeholder="コメントを書いてね"
        >
        <button class="send-btn" onclick="addComment(${index})">送信</button>
      </div>

      <div class="comments">
        <div class="small">コメント ${art.comments.length} 件</div>
        ${art.comments.map(comment => `<div class="comment">${comment}</div>`).join("")}
      </div>
    </div>
  `).join("");
}

saveData();
render();
</script>

</body>
</html>
